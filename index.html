document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

      <sc-if value=\"{{ gallery3IsImage }}\" hint-placeholder-val=\"{{ false }}\"><img src=\"{{ gallery3Src }}\" style=\"position:absolute; inset:0; width:100%; height:100%; object-fit:cover; display:block;\"><\u002Fsc-if>\n        <\u002Fdiv>\n        <div style=\"position:relative; aspect-ratio:3/4; overflow:hidden; background:repeating-linear-gradient(135deg,var(--stripe1) 0 12px,var(--stripe2) 12px 24px);\">\n          <sc-if value=\"{{ gallery10IsImage }}\" hint-placeholder-val=\"{{ false }}\"><img src=\"{{ gallery10Src }}\" style=\"position:absolute; inset:0; width:100%; height:100%; object-fit:cover; display:block;\"><\u002Fsc-if>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <h1 style=\"font-family: Halvers,'Helvetica Neue',Helvetica,Arial,sans-serif; font-size: 43px; line-height: 38px; font-weight: 700; margin: 78px 0 0; letter-spacing: 0.07px; text-wrap: pretty\">Senior product designer working where <span style=\"font-style: italic; font-weight: 500; color: rgb(35, 108, 255)\">healthcare meets AI<\u002Fspan> — building tools people trust<\u002Fh1>\n      \n      <p style=\"font-family: 'Helvetica Neue',Helvetica,Arial,sans-serif; font-weight: 350; font-size: 18px; line-height: 1.6; letter-spacing: 0.5px; color: var(--ink); margin: 52px 0 0; max-width: 560px\">For almost two years, I’m a senior designer at DocDoc, a healthcare app, where I design a medical AI assistant and help turn it into a tool people really use.&nbsp;Before that, I spent three years as a product designer at ToYou, a leading Saudi delivery and shopping super app, where I built an internal payment system and redesigned key flows — lifting checkout conversion by 15%.<br><br>I love a good challenge, and I’m at my best generating ideas and carrying them all the way from concept to release. People are my main source of inspiration — I’m driven by creating services that meet real needs. Strong professional communication and teamwork are what keep me motivated.<br><\u002Fp>\n    <\u002Fsection>\n\n    <!-- SELECTED WORK -->\n    <section id=\"work\" style=\"padding:8px 0 40px; scroll-margin-top:48px;\">\n      <div style=\"font-family: 'Consola Mono',monospace; font-size: 11px; letter-spacing: .12em; text-transform: uppercase; color: #949494; margin-bottom: 8px\">Selected work<\u002Fdiv>\n\n      <!-- CASE 1 -->\n      <div style=\"border-top:1px solid var(--line);\">\n        <div onclick=\"{{ toggleC1 }}\" role=\"button\" style=\"cursor:pointer; padding:28px 0;\">\n          <div style=\"box-sizing: border-box\"><div style=\"display:flex; align-items:baseline; gap:16px;\">\n            <span style=\"font-family: 'Consola Mono',monospace; font-size: 11px; color: var(--acc)\">01<\u002Fspan>\n            <span style=\"font-family: 'Consola Mono',monospace; font-size: 10px; letter-spacing: .08em; text-transform: uppercase; color: #949494\"><span style=\"display: inline-block; color: #fff; padding: 4px 9px; border-radius: 3px; background-color: #3e5fff\">DESIGN CASE<\u002Fspan> · 2024-2026 · DOCDOC<\u002Fspan>\n            <span style=\"margin-left:auto; font-family:'Consola Mono',monospace; font-size:20px; color:var(--mut); line-height:1;\">{{ openC1sym }}<\u002Fspan>\n          <\u002Fdiv><div style=\"font-size: 27px; line-height: 1.18; font-weight: 800; margin-top: 18px; letter-spacing: 0.5px\">Healthtech: designing trust into AI assistant<\u002Fdiv><\u002Fdiv>\n          \n          \n          <div style=\"font-size: 15px; font-family: 'Helvetica Neue',Helvetica,Arial,sans-serif; font-weight: 350; line-height: 1.5; letter-spacing: 0.5px; color: #ADADAD; margin-top: 8px\">Make health care accessible 24/7 — right in the app<\u002Fdiv>\n          <div style=\"position:relative; height:300px; margin-top:22px; border:1px solid var(--line); overflow:hidden; background:repeating-linear-gradient(135deg,var(--stripe1) 0 12px,var(--stripe2) 12px 24px);\">\n            <sc-if value=\"{{ case1IsVideo }}\" hint-placeholder-val=\"{{ false }}\">\n              <video src=\"{{ case1Src }}\" autoplay=\"\" loop=\"\" muted=\"\" playsinline=\"\" style=\"position:absolute; inset:0; width:100%; height:100%; object-fit:cover; display:block;\"><\u002Fvideo>\n            <\u002Fsc-if>\n            <sc-if value=\"{{ case1IsImage }}\" hint-placeholder-val=\"{{ false }}\">\n              <img src=\"{{ case1Src }}\" style=\"position:absolute; inset:0; width:100%; height:100%; object-fit:cover; display:block;\">\n            <\u002Fsc-if>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <sc-if value=\"{{ openC1 }}\" hint-placeholder-val=\"{{ false }}\">\n          <div style=\"padding:4px 0 40px;\">\n            <div style=\"font-family:'Consola Mono',monospace; font-size:11px; letter-spacing:.1em; text-transform:uppercase; color:var(--mut); margin:18px 0 0;\">Context<\u002Fdiv>\n            <p style=\"font-size:18px; line-height:1.68; margin:12px 0 0;\">AI assistant is a part of the healthcare app for online consultations, clinic bookings, and corporate solutions, serving 1.1M monthly web users and 400K app users. When we launched the assistant in 2024, two problems were clear: users wanted fast 24/7 help for simple cases but faced long waits and repetitive questions — while doctors were overloaded and costs kept climbing.&nbsp;<span style=\"caret-color: rgb(0, 0, 0); color: rgb(0, 0, 0);\">We also needed a scalable product with the potential to evolve into a full-fledged user support tool.<\u002Fspan><\u002Fp><p><\u002Fp><p><\u002Fp>\n            \n            <div style=\"font-family:'Consola Mono',monospace; font-size:11px; letter-spacing:.1em; text-transform:uppercase; color:var(--mut); margin:30px 0 0;\">GOALS<\u002Fdiv>\n            <p style=\"font-size:18px; line-height:1.68; margin:12px 0 0;\">Short-term: reduce the workload on on-duty doctors, specialists, tech support. Reduce the cost of resolving a single medical case for clients.<\u002Fp><p style=\"font-size:18px; line-height:1.68; margin:12px 0 0;\">Long-term: Build a future-proof product designed to grow and evolve into a fully-featured assistant<\u002Fp>\n            <div style=\"margin-top:30px;\">\n              <div onclick=\"{{ toggleD1 }}\" role=\"button\" style=\"cursor:pointer; padding:18px 0; display:flex; align-items:center; gap:14px;\">\n                <span style=\"font-family:'Consola Mono',monospace; font-size:11px; letter-spacing:.1em; text-transform:uppercase; color:var(--mut);\">HYPOTHESES<\u002Fspan>\n                <span style=\"margin-left:auto; font-family:'Consola Mono',monospace; font-size:16px; color:var(--mut); line-height:1;\">{{ openD1sym }}<\u002Fspan>\n              <\u002Fdiv>\n              <sc-if value=\"{{ openD1 }}\" hint-placeholder-val=\"{{ false }}\">\n                <p style=\"font-size:18px; line-height:1.68; margin:0 0 14px;\">If routine requests — symptom checks, FAQs, lab result explanations — are handled by the AI assistant, doctors spend less time on administrative work and more on clinical decisions.<\u002Fp>\n                <p style=\"font-size:18px; line-height:1.68; margin:0 0 14px;\">If the assistant answers common technical and product questions instantly, fewer tickets reach tech support.<\u002Fp>\n                <p style=\"font-size:18px; line-height:1.68; margin:0 0 14px;\">If automating data collection (anamnesis, symptom intake, document prep) shortens consultations, the average time per case drops — and so does the cost per medical case.<\u002Fp>\n                <p style=\"font-size:18px; line-height:1.68; margin:0 0 18px;\">If users get faster answers through AI, satisfaction and trust grow, indirectly reducing repeat consultations and support load.<\u002Fp>\n              <\u002Fsc-if>\n            <\u002Fdiv>\n            <div>\n              <div onclick=\"{{ toggleD2 }}\" role=\"button\" style=\"cursor:pointer; padding:18px 0; display:flex; align-items:center; gap:14px;\">\n                <span style=\"font-family:'Consola Mono',monospace; font-size:11px; letter-spacing:.1em; text-transform:uppercase; color:var(--mut);\">SOLUTION<\u002Fspan>\n                <span style=\"margin-left:auto; font-family:'Consola Mono',monospace; font-size:16px; color:var(--mut); line-height:1;\">{{ openD2sym }}<\u002Fspan>\n              <\u002Fdiv>\n              <sc-if value=\"{{ openD2 }}\" hint-placeholder-val=\"{{ false }}\">\n                <p style=\"font-size:18px; line-height:1.68; margin:0 0 18px;\">I designed and helped implement the AI assistant. It included flows like: doctor suggestions by symptom, general health consultations, lab result decoding with file upload, FAQ/tech support channel. By redirecting routine requests to the AI and automating data collection such as anamnesis, we streamlined the workflow, shortened consultation time, eased the load on tech support, and met user needs for simple cases without always requiring a specialist. In 2026 AI-therapist, online doctor appointment booking and second opinion flows were added.<\u002Fp>\n              <\u002Fsc-if>\n            <\u002Fdiv>\n            <div style=\"font-family:'Consola Mono',monospace; font-size:11px; letter-spacing:.1em; text-transform:uppercase; color:var(--mut); margin:30px 0 0;\">Result<\u002Fdiv>\n            <p style=\"font-size:18px; line-height:1.68; margin:12px 0 0;\">The AI assistant reached 250,000 active users (26,000 MAU), reduced consultation time by 20%, cut support requests by 15%, lowered on-duty doctor workload by 17%, and brought down cost per case by 8%. It also won the GenAI 2025 award for best client service. We launched it in just 90 days, hitting 33,000 users in the first month — 110% of target — and converting 16% of recommendations into paid bookings.<\u002Fp>\n            <div style=\"display:flex; gap:48px; margin-top:30px; font-family:'Consola Mono',monospace; font-size:10px; letter-spacing:.06em; text-transform:uppercase; color:var(--mut); line-height:1.9;\">\n              <div>Role<br><span style=\"color:var(--ink);\">SENIOR DESIGNER<\u002Fspan><\u002Fdiv>\n              \n              <div>Outcome<br><span style=\"color:var(--acc);\">250,000 ACTIVE USERS, REDUCED CONSULTATION TIME BY 20%, CUT SUPPORT REQUESTS BY 15%, REDUCED ON-DUTY DOCTOR WORKLOAD BY 17%, AND LOWERED THE COST PER CASE BY 8%<\u002Fspan><\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fsc-if>\n      <\u002Fdiv>\n\n      <!-- CASE 1 (duplicate) -->\n      \n\n      <!-- CASE 2 -->\n      <div style=\"border-top:1px solid var(--line);\">\n        <div onclick=\"{{ toggleC2 }}\" role=\"button\" style=\"cursor:pointer; padding:28px 0;\">\n          <div style=\"display:flex; align-items:baseline; gap:16px;\">\n            <span style=\"font-family:'Consola Mono',monospace; font-size:11px; color:var(--acc);\">02<\u002Fspan>\n            <span style=\"font-family: 'Consola Mono',monospace; font-size: 10px; letter-spacing: .08em; text-transform: uppercase; color: #949494\">AWARD · 2026<\u002Fspan>\n            <span style=\"margin-left:auto; font-family:'Consola Mono',monospace; font-size:20px; color:var(--mut); line-height:1;\">{{ openC2sym }}<\u002Fspan>\n          <\u002Fdiv>\n          <div style=\"font-size: 27px; line-height: 1.18; font-weight: 800; margin-top: 12px; letter-spacing: 0.5px\">Best Virtual Assistant: Tech &amp; AI Awards 2026<\u002Fdiv>\n          <div style=\"font-size: 15px; font-family: 'Helvetica Neue',Helvetica,Arial,sans-serif; font-weight: 350; line-height: 1.5; letter-spacing: 0.5px; color: #ADADAD; margin-top: 8px\">AI assistant got recognised again!<\u002Fdiv>\n        <\u002Fdiv>\n        <sc-if value=\"{{ openC2 }}\" hint-placeholder-val=\"{{ false }}\">\n          <div style=\"padding:4px 0 40px;\">\n            <div style=\"position:relative; height:300px; border:1px solid var(--line); overflow:hidden; background:repeating-linear-gradient(135deg,var(--stripe1) 0 12px,var(--stripe2) 12px 24px);\">\n              <sc-if value=\"{{ c2shotIsVideo }}\" hint-placeholder-val=\"{{ false }}\"><video src=\"{{ c2shotSrc }}\" autoplay=\"\" loop=\"\" muted=\"\" playsinline=\"\" style=\"position:absolute; inset:0; width:100%; height:100%; object-fit:cover; display:block;\"><\u002Fvideo><\u002Fsc-if>\n              <sc-if value=\"{{ c2shotIsImage }}\" hint-placeholder-val=\"{{ false }}\"><img src=\"{{ c2shotSrc }}\" style=\"position:absolute; inset:0; width:100%; height:100%; object-fit:cover; display:block;\"><\u002Fsc-if>\n              <\u002Fdiv>\n            <p style=\"font-size:18px; line-height:1.68; margin:26px 0 0;\">Intake was a wall of fields built for billing, not for people in pain. We sequenced questions by urgency, deferred everything optional, and let the system pre-fill from prior visits — so most patients only answered what had actually changed.<\u002Fp>\n            <div style=\"display:flex; gap:48px; margin-top:30px; font-family:'Consola Mono',monospace; font-size:10px; letter-spacing:.06em; text-transform:uppercase; color:var(--mut); line-height:1.9;\">\n              <div>Role<br><span style=\"color:var(--ink);\">Design lead<\u002Fspan><\u002Fdiv>\n              <div>Year<br><span style=\"color:var(--ink);\">2024<\u002Fspan><\u002Fdiv>\n              <div>Outcome<br><span style=\"color:var(--acc);\">−67% drop-off<\u002Fspan><\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fsc-if>\n      <\u002Fdiv><div style=\"border-top:1px solid var(--line);\">\n        <div onclick=\"{{ toggleC7 }}\" role=\"button\" style=\"cursor:pointer; padding:28px 0;\">\n          <div style=\"display:flex; align-items:baseline; gap:16px;\">\n            <span style=\"font-family:'Consola Mono',monospace; font-size:11px; color:var(--acc);\">03<\u002Fspan>\n            <span style=\"font-family: 'Consola Mono',monospace; font-size: 10px; letter-spacing: .08em; text-transform: uppercase; color: #949494\"><span style=\"display: inline-block; color: #fff; padding: 4px 9px; border-radius: 3px; background-color: #3e5fff\">DESIGN CASE<\u002Fspan> · 2025· DOCDOC<\u002Fspan>\n            <span style=\"margin-left:auto; font-family:'Consola Mono',monospace; font-size:20px; color:var(--mut); line-height:1;\">{{ openC7sym }}<\u002Fspan>\n          <\u002Fdiv>\n          \n          <div style=\"font-size: 27px; line-height: 1.18; font-weight: 800; margin-top: 12px; letter-spacing: 0.5px\">AI decoding lab results: from numbers to clear answers<br><\u002Fdiv>\n          <div style=\"font-size: 15px; color: #ADADAD; margin-top: 8px; font-family: 'Helvetica Neue',Helvetica,Arial,sans-serif; font-weight: 350; line-height: 1.5; letter-spacing: 0.5px\">Understandable explanations without crossing into diagnosis<br><\u002Fdiv>\n          <div style=\"position:relative; height:300px; margin-top:22px; border:1px solid var(--line); overflow:hidden; background:repeating-linear-gradient(135deg,var(--stripe1) 0 12px,var(--stripe2) 12px 24px);\">\n            <sc-if value=\"{{ c7shotIsVideo }}\" hint-placeholder-val=\"{{ false }}\"><video src=\"{{ c7shotSrc }}\" autoplay=\"\" loop=\"\" muted=\"\" playsinline=\"\" style=\"position:absolute; inset:0; width:100%; height:100%; object-fit:cover; display:block;\"><\u002Fvideo><\u002Fsc-if>\n            <sc-if value=\"{{ c7shotIsImage }}\" hint-placeholder-val=\"{{ false }}\"><img src=\"{{ c7shotSrc }}\" style=\"position:absolute; inset:0; width:100%; height:100%; object-fit:cover; display:block;\"><\u002Fsc-if>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <sc-if value=\"{{ openC7 }}\" hint-placeholder-val=\"{{ false }}\">\n          <div style=\"padding:4px 0 40px;\">\n            <div style=\"font-family:'Consola Mono',monospace; font-size:11px; letter-spacing:.1em; text-transform:uppercase; color:var(--mut); margin:18px 0 0;\">Context<\u002Fdiv>\n            <p style=\"font-size:18px; line-height:1.68; margin:12px 0 0;\">AI assistant is a part of the healthcare app for online consultations, clinic bookings, and corporate solutions, serving 1.1M monthly we stantly, fewer tickets reach tech support.<\u002Fp>\n                <p style=\"font-size:18px; line-height:1.68; margin:0 0 14px;\">If automating data collection (anamnesis, symptom intake, document prep) shortens consultations, the average time per case drops — and so does the cost per medical case.<\u002Fp>\n                <p style=\"font-size:18px; line-height:1.68; margin:0 0 18px;\">If users get faster answers through AI, satisfaction and trust grow, indirectly reducing repeat consultations and support load.<\u002Fp>\n              <\u002Fsc-if>\n            <\u002Fdiv>\n            <div>\n              <div onclick=\"{{ toggleD4 }}\" role=\"button\" style=\"cursor:pointer; padding:18px 0; display:flex; align-items:center; gap:14px;\">\n                <span style=\"font-family:'Consola Mono',monospace; font-size:11px; letter-spacing:.1em; text-transform:uppercase; color:var(--mut);\">SOLUTION<\u002Fspan>\n                <span style=\"margin-left:auto; font-family:'Consola Mono',monospace; font-size:16px; color:var(--mut); line-height:1;\">{{ openD4sym }}<\u002Fspan>\n              <\u002Fdiv>\n              <sc-if value=\"{{ openD4 }}\" hint-placeholder-val=\"{{ false }}\">\n                <p style=\"font-size:18px; line-height:1.68; margin:0 0 18px;\">I designed and helped implement the AI assistant. It included flows like: doctor suggestions by symptom, general health consultations, lab result decoding with file upload, FAQ/tech support channel. By redirecting routine requests to the AI and automating data collection such as anamnesis, we streamlined the workflow, shortened consultation time, eased the load on tech support, and met user needs for simple cases without always requiring a specialist. In 2026 AI-therapist, online doctor appointment booking and second opinion flows were added.<\u002Fp>\n              <\u002Fsc-if>\n            <\u002Fdiv>\n            <div style=\"font-family:'Consola Mono',monospace; font-size:11px; letter-spacing:.1em; text al=\"{{ false }}\">\n          <div style=\"padding:0 0 32px;\">\n            <p style=\"font-size:18px; line-height:1.68; margin:0; color:var(--mut); font-style:italic;\">Post text goes here — replace with the real essay.<\u002Fp>\n          <\u002Fdiv>\n        <\u002Fsc-if>\n      <\u002Fdiv>\n\n      <div style=\"border-top:1px solid var(--line); border-bottom:1px solid var(--line);\">\n        <div onclick=\"{{ toggleB3 }}\" role=\"button\" style=\"padding:24px 0; display:flex; gap:20px; align-items:center; cursor:pointer;\">\n          <div style=\"flex:1;\">\n            <div style=\"font-family: 'Consola Mono',monospace; font-size: 10px; letter-spacing: .08em; text-transform: uppercase; color: #949494\">Essay · 2023<\u002Fdiv>\n            <div style=\"font-size: 22px; line-height: 1.18; margin-top: 12px; font-weight: 600; letter-spacing: 0.5px\">The quiet craft of empty states<\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"font-family:'Consola Mono',monospace; font-size:20px; color:var(--mut); line-height:1;\">{{ openB3sym }}<\u002Fdiv>\n        <\u002Fdiv>\n        <sc-if value=\"{{ openB3 }}\" hint-placeholder-val=\"{{ false }}\">\n          <div style=\"padding:0 0 32px;\">\n            <p style=\"font-size:18px; line-height:1.68; margin:0; color:var(--mut); font-style:italic;\">Post text goes here — replace with the real essay.<\u002Fp>\n          <\u002Fdiv>\n        <\u002Fsc-if>\n      <\u002Fdiv>\n    <\u002Fsection>\n\n    <!-- ABOUT -->\n    <section id=\"about\" style=\"padding:64px 0 40px; scroll-margin-top:48px;\">\n      <div style=\"font-family: 'Consola Mono',monospace; font-size: 11px; letter-spacing: .12em; text-transform: uppercase; color: #949494; margin-bottom: 24px\">ABOUT ME<\u002Fdiv>\n      <div style=\"max-width: 560px; font-family: 'Helvetica Neue',Helvetica,Arial,sans-serif; font-weight: 350; font-size: 18px; line-height: 1.6; letter-spacing: 0.2px; color: var(--ink); margin: 52px 0 0\">\n        <p style=\"font-size: 18px; line-height: 1.6; margin: 52px 0 0; color: var(--ink); font-family: 'Helvetica Neue',Helvetica,Arial,sans-serif; font-weight: 350; letter-spacing: 0.6px; max-width: 560px\"><span data-metadata=\"&lt;!--(figmeta)eyJmaWxlS2V5IjoiNE42ejRNbkF5QU9pS2lYc2J6NWJ6dCIsInBhc3RlSUQiOjkzNDQ2NzE5MiwiZGF0YVR5cGUiOiJzY2VuZSIsImVudmlyb25tZW50Ijoid3d3LmZpZ21hLmNvbSIsInNlbGVjdGVkTm9kZURhdGEiOiI5OjUwNzYwfDMxfDAifQo=(/figmeta)--&gt;\"><\u002Fspan><span style=\"white-space: pre-wrap;\">I am an experienced designer with 5 years in product and 8+ years in design in general. Now I work as a senior product designer at healthtech company, focusing mainly on AI.\n<\u002Fspan><\u002Fp><p style=\"font-size: 18px; line-height: 1.6; margin: 29px 0 0; color: var(--ink); font-family: 'Helvetica Neue',Helvetica,Arial,sans-serif; font-weight: 350; letter-spacing: 0.6px; max-width: 560px\"><span data-metadata=\"&lt;!--(figmeta)eyJmaWxlS2V5IjoiNE42ejRNbkF5QU9pS2lYc2J6NWJ6dCIsInBhc3RlSUQiOjkzNDQ2NzE5MiwiZGF0YVR5cGUiOiJzY2VuZSIsImVudmlyb25tZW50Ijoid3d3LmZpZ21hLmNvbSIsInNlbGVjdGVkTm9kZURhdGEiOiI5OjUwNzYwfDMxfDAifQo=(/figmeta)--&gt;\"><\u002Fspan><span style=\"white-space: pre-wrap;\">I live in Moscow now, but want to relocate and currently looking for international job opportunities.\n<\u002Fspan><\u002Fp>\n        <div style=\"font-size: 18px; line-height: 1.6; color: var(--ink); margin: 29px 0 0; font-family: 'Helvetica Neue',Helvetica,Arial,sans-serif; font-weight: 350; letter-spacing: 0.5px; max-width: 560px\"><div>Before healthcare, I was a product designer at a delivery super app in Saudi Arabia. For three years, my team and I were improving the user experience across delivery, courier services, and taxi.<\u002Fdiv><div style=\"margin-top:29px;\">Earlier, I worked as a web designer and illustrator at Sber. We launched an online portal for retired bank clients a year before COVID-19, and it helped many users cope during the pandemic — we published content on self-care, fitness, entertainment, and health. I created illustrations for podcasts and web pages, curated the portal’s visuals, and hired illustrators for my team.<\u002Fdiv><div style=\"margin-top:29px;\">In my free time, I create digital art and code small pet projects. My art history degree inspires some of them — right now I’m building a database of historic churches in Lincolnshire that I’ve visited.<br><\u002Fdiv><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsection>\n\n    <!-- GALLERY 2 -->\n    <div ref=\"{{ feedRef }}\" style=\"width:calc(100vw - 280px); margin:0 0 54px calc(50% - 50vw + 140px); overflow-x:auto; cursor:grab;\">\n      <div style=\"display:flex; width:max-content;\">\n        <div style=\"position:relative; width:280px; aspect-ratio:3/4; flex:0 0 auto; overflow:hidden; background:repeating-linear-gradient(135deg,var(--stripe1) 0 12px,var(--stripe2) 12px 24px);\">\n          <sc-if value=\"{{ gallery4IsImage }}\" hint-placeholder-val=\"{{ false }}\"><img src=\"{{ gallery4Src }}\" style=\"position:absolute; inset:0; width:100%; height:100%; object-fit:cover; display:block;\"><\u002Fsc-if>\n        <\u002Fdiv>\n        <div style=\"position:relative; width:280px; aspect-ratio:3/4; flex:0 0 auto; overflow:hidden; background:repeating-linear-gradient(135deg,var(--stripe1) 0 12px,var(--stripe2) 12px 24px);\">\n          <sc-if value=\"{{ gallery5IsImage }}\" hint-placeholder-val=\"{{ false }}\"><img src=\"{{ gallery5Src }}\" style=\"position:absolute; inset:0; width:100%; height:100%; object-fit:cover; display:block;\"><\u002Fsc-if>\n        <\u002Fdiv>\n        <div style=\"position:relative; width:280px; aspect-ratio:3/4; flex:0 0 auto; overflow:hidden; background:repeating-linear-gradient(135deg,var(--stripe1) 0 12px,var(--stripe2) 12px 24px);\">\n          <sc-if value=\"{{ gallery6IsImage }}\" hint-placeholder-val=\"{{ false }}\"><img src=\"{{ gallery6Src }}\" style=\"position:absolute; inset:0; width:100%; height:100%; object-fit:cover; display:block;\"><\u002Fsc-if>\n        <\u002Fdiv>\n        <div style=\"position:relative; width:280px; aspect-ratio:3/4; flex:0 0 auto; overflow:hidden; background:repeating-linear-gradient(135deg,var(--stripe1) 0 12px,var(--stripe2) 12px 24px);\">\n          <sc-if value=\"{{ gallery7IsImage }}\" hint-placeholder-val=\"{{ false }}\"><img src=\"{{ gallery7Src }}\" style=\"position:absolute; inset:0; width:100%; height:100%; object-fit:cover; display:block;\"><\u002Fsc-if>\n        <\u002Fdiv>\n        <div style=\"position:relative; width:280px; aspect-ratio:3/4; flex:0 0 auto; overflow:hidden; background:repeating-linear-gradient(135deg,var(--stripe1) 0 12px,var(--stripe2) 12px 24px);\">\n          <sc-if value=\"{{ gallery8IsImage }}\" hint-placeholder-val=\"{{ false }}\"><img src=\"{{ gallery8Src }}\" style=\"position:absolute; inset:0; width:100%; height:100%; object-fit:cover; display:block;\"><\u002Fsc-if>\n        <\u002Fdiv>\n        <div style=\"position:relative; width:280px; aspect-ratio:3/4; flex:0 0 auto; overflow:hidden; background:repeating-linear-gradient(135deg,var(--stripe1) 0 12px,var(--stripe2) 12px 24px);\">\n          <sc-if value=\"{{ gallery9IsImage }}\" hint-placeholder-val=\"{{ false }}\"><img src=\"{{ gallery9Src }}\" style=\"position:absolute; inset:0; width:100%; height:100%; object-fit:cover; display:block;\"><\u002Fsc-if>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- MY VALUES -->\n    <section id=\"values\" style=\"padding: 10px 0 40px; scroll-margin-top: 48px; width: 617px\">\n      <div onclick=\"{{ toggleAB }}\" role=\"button\" style=\"cursor:pointer; max-width:600px; display:flex; align-items:center; gap:14px;\">\n        <span style=\"display:inline-flex; align-items:center; gap:8px; font-family: 'Consola Mono',monospace; font-size: 11px; letter-spacing: .12em; text-transform: uppercase; color: #949494\">MY VALUES AND EVERYDAY LIFE<\u002Fspan>\n        <span style=\"margin-left:auto; font-family:'Consola Mono',monospace; font-size:16px; color:var(--mut); line-height:1;\">{{ openABsym }}<\u002Fspan>\n      <\u002Fdiv>\n      <sc-if value=\"{{ openAB }}\" hint-placeholder-val=\"{{ false }}\"><div style=\"max-width:600px;\">\n        <div style=\"font-size: 21px; line-height: 1.6; margin: 0; text-wrap: pretty; color: var(--ink)\"><div style=\"font-family: 'Helvetica Neue',Helvetica,Arial,sans-serif; font-weight: 350; font-size: 18px; line-height: 1.6; letter-spacing: 0.5px; color: var(--ink); margin: 18px 0 0; max-width: 560px\">I enjoy playing music, reading, traveling and going to concerts (still hoping to see Paul McCartney one day). Really want to adopt a dog one day, and maybe 1-2 cats.<br><br>Curiosity drives me: I love meeting new people, exploring new places, and learning languages.<br><\u002Fdiv><\u002Fdiv>\n      <\u002Fdiv><\u002Fsc-if>\n    <\u002Fsection>\n\n    <!-- CONTACT -->\n    <section id=\"contact\" style=\"padding:64px 0 120px; scroll-margin-top:48px;\">\n      <div style=\"font-family: 'Consola Mono',monospace; font-size: 11px; letter-spacing: .12em; text-transform: uppercase; color: #949494; margin-bottom: 24px\">Contact<\u002Fdiv>\n      \n      <div style=\"font-size: 32px; line-height: 34px; font-weight: 700; font-family: Halvers,'Helvetica Neue',Helvetica,Arial,sans-serif; margin: 0px 0 0; letter-spacing: 0.07px; text-wrap: pretty\">Feel free to contact me any time:<br><a href=\"mailto:maya@ellison.design\" style=\"border-bottom: 1px solid var(--acc); color: var(--acc);\">stormtrooooper@gmail.com<\u002Fa><\u002Fdiv><div style=\"margin-top:28px; font-family:'Consola Mono',monospace; font-size:14px; line-height:2; color:var(--mut); display:flex; gap:24px;\">\n        <a href=\"https://www.linkedin.com/in/mikeymaika/\" target=\"_blank\" rel=\"noopener\">LinkedIn ↗<\u002Fa>\n        <a href=\"https://www.instagram.com/mikeymaika\" target=\"_blank\" rel=\"noopener\">Instagram ↗<\u002Fa>\n        <a href=\"https://www.facebook.com/mikeymaika/\" target=\"_blank\" rel=\"noopener\">Facebook ↗<\u002Fa>\n      <\u002Fdiv>\n    <\u002Fsection>\n  <\u002Fmain>\n\n  <!-- ===================== RIGHT RAIL ===================== -->\n  <aside style=\"position: fixed; top: 0; right: 0; width: 280px; height: 100vh; border-left: 1px solid var(--line); padding: 124px 40px 48px; display: flex; flex-direction: column; background-color: var(--bg); transition: background-color .2s;\">\n    \n    \n\n    <nav style=\"margin-top:48px; display:flex; flex-direction:column; gap:16px; font-family:'Halvers','Helvetica Neue',Helvetica,sans-serif; font-weight:500; font-size:13px; letter-spacing:0.3px;\">\n      <sc-for list=\"{{ navItems }}\" as=\"item\" hint-placeholder-count=\"4\">\n        <a href=\"{{ item.href }}\" style=\"{{ item.style }}\">\n          <span style=\"{{ item.labelStyle }}\">{{ item.label }}<\u002Fspan>\n        <\u002Fa>\n      <\u002Fsc-for>\n    <\u002Fnav>\n\n    <div style=\"margin-top:auto; padding-top:36px; font-family:'Consola Mono',monospace; font-size:11px; line-height:2; color:var(--mut);\">\n      <a href=\"mailto:maya@ellison.design\" style=\"color:var(--ink);\">Social media<\u002Fa>\n      <div><a href=\"https://www.linkedin.com/in/mikeymaika/\" target=\"_blank\" rel=\"noopener\" data-om-label=\"https://www.linkedin.com/in/mikeymaika/\">LinkedIn ↗<\u002Fa><\u002Fdiv>\n      <div><a href=\"https://www.instagram.com/mikeymaika\" target=\"_blank\" rel=\"noopener\">Instagram ↗<\u002Fa><\u002Fdiv>\n      <div><a href=\"https://www.facebook.com/mikeymaika/\" target=\"_blank\" rel=\"noopener\">Facebook ↗<\u002Fa><\u002Fdiv>\n    <\u002Fdiv>\n\n    <div onclick=\"{{ toggleDark }}\" role=\"button\" style=\"{{ switchTrackStyle }}\">\n      <span style=\"{{ switchKnobStyle }}\"><\u002Fspan>\n      <span style=\"{{ switchLabelStyle }}\">{{ modeLabel }}<\u002Fspan>\n    <\u002Fdiv>\n  <\u002Faside>\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\">\nconst SUPABASE_URL = 'https://lakzdkvjhopsakwooyah.supabase.co';\nconst SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imxha3pka3ZqaG9wc2Frd29veWFoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODMxOTc5MjMsImV4cCI6MjA5ODc3MzkyM30.qhajE0xWucSL5o6cQfUY3n3_Y46MKVO21xfMDcs4IFc';\nconst SUPABASE_BUCKET = 'Portfolio';\n\nclass Component extends DCLogic {\n  state = { open: {}, active: 'work', media: {}, dark: true };\n\n  getClient() {\n    if (!this._sb && window.supabase) {\n      this._sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);\n    }\n    return this._sb;\n  }\n  publicUrl(path) {\n    const sb = this.getClient();\n    if (!sb) return null;\n    return sb.storage.from(SUPABASE_BUCKET).getPublicUrl(path).data.publicUrl;\n  }\n  // Images are fixed — sourced straight from Supabase Storage, no upload UI on the page.\n  // Replace them by uploading directly to the \"Portfolio\" bucket in the Supabase dashboard.\n  // Uploaders usually keep the original extension, so try the bare id first, then common\n  // image/video extensions, and use whichever one actually exists in the bucket.\n  async loadMediaFromSupabase() {\n    const ids = ['case1', 'c7shot', 'c8shot', 'c9shot', 'c2shot', 'c4shot', 'gallery1', 'gallery2', 'gallery3', 'gallery4', 'gallery5', 'gallery6', 'gallery7', 'gallery8', 'gallery9', 'gallery10'];\n    const exts = ['', '.png', '.jpg', '.jpeg', '.webp', '.gif', '.svg', '.mp4', '.webm', '.mov'];\n    const media = {};\n    await Promise.all(ids.map(async (id) => {\n      for (const ext of exts) {\n        const url = this.publicUrl(id + ext);\n        if (!url) return;\n        try {\n          const res = await fetch(url + '?v=' + Date.now(), { method: 'HEAD', cache: 'no-store' });\n          if (res.ok) {\n            const type = res.headers.get('content-type') || '';\n            media[id] = { type, src: url + '?v=' + Date.now() };\n            return;\n          }\n        } catch (e) { /* try next extension */ }\n      }\n    }));\n    return media;\n  }\n  feedRef = (el) => {\n
